name: Release macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, for example 0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      target: ${{ steps.meta.outputs.target }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Resolve version and tag
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="${INPUT_VERSION#v}"
            TAG="v${VERSION}"
            PRERELEASE="${INPUT_PRERELEASE}"
          else
            TAG="${PUSH_TAG}"
            VERSION="${TAG#v}"
            PRERELEASE="false"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Version could not be resolved." >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "target=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }} release
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            label: apple-silicon
          - runner: macos-15-intel
            label: intel
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build packaged macOS release artifacts
        env:
          AUTOTAP_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          ./Scripts/release_macos.sh --release --version "${AUTOTAP_RELEASE_VERSION}"

      - name: Collect release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp dist/*.zip release-assets/
          cp dist/*.zip.sha256 release-assets/
          cp dist/*-binary.tar.gz release-assets/
          cp dist/*-binary.tar.gz.sha256 release-assets/
          ls -la release-assets

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ matrix.label }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-release-*
          path: release-assets
          merge-multiple: true

      - name: Write release notes
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          ## AutoTap ${VERSION}

          A simple macOS auto-clicker with safe controls.

          ### Downloads

          - \`*-macos-arm64.zip\`: packaged app for Apple Silicon Macs
          - \`*-macos-x86_64.zip\`: packaged app for Intel Macs
          - \`*-binary.tar.gz\`: raw standalone executable for advanced use
          - \`*.sha256\`: checksums for archive verification

          ### Install

          1. Download the archive that matches your Mac.
          2. Unzip it.
          3. Move \`AutoTap.app\` into \`/Applications\`.
          4. On first launch, macOS may warn because the app is unsigned. If that happens, right-click the app and choose \`Open\`.
          EOF

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: AutoTap ${{ needs.prepare.outputs.version }}
          body_path: release-notes.md
          files: |
            release-assets/*
          fail_on_unmatched_files: true
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
